# Reusable R-CMD-check workflow for macroverse-r packages.
#
# Consumers invoke as:
#   on:
#     push:
#       branches: [main]
#     pull_request:
#   jobs:
#     R-CMD-check:
#       uses: macroverse-r/.github/.github/workflows/r-check.yml@v0.0.1
#
# macroverse-r is pre-1.0: consumers pin to immutable patch tags
# (`@v0.0.1`, `@v0.0.2`, ...) rather than `@main`. The contract is
# not yet stable enough for a moving major tag; `@v1` will ship when
# the workflow API stabilises. Per SemVer 0.x conventions, minor
# bumps within `0.x.y` may be breaking, so do not pin a floating
# `@v0` major tag.

on:
  workflow_call:

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
